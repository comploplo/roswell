# cargo-deny configuration. Run: `cargo deny check`

[advisories]
version = 2
yanked = "deny"
# Add RUSTSEC ids here with a note if a transitive advisory must be tolerated.
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
# Keep a forward-compatible allow list without warning on unused entries.
unused-allowed-license = "allow"
# Permissive licenses we accept across the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
]

# Our own (unpublished) workspace crates.
[licenses.private]
ignore = true

# Verification-only Creusot tooling (LGPL-2.1). Pulled in solely by the opt-in
# `verify` feature — never compiled or linked into shipped artifacts — so its
# copyleft terms do not reach roswell's distribution. Scoped per-crate so the
# LGPL allowance does not widen to the rest of the tree.
[[licenses.exceptions]]
crate = "creusot-std"
allow = ["LGPL-2.1-or-later"]

[[licenses.exceptions]]
crate = "creusot-std-proc"
allow = ["LGPL-2.1-or-later"]

[bans]
# Duplicate versions are common in large trees; surface but don't fail the gate.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# creusot-std (verify feature only) is unpublished; pinned by rev in roswell-verify.
allow-git = ["https://github.com/creusot-rs/creusot"]
